# Founding operating model
decision_rule: >-
  Each lead decides within their domain. Cross-domain calls need any 2 of 4 leads.
  Deadlocks: Managing Partner decides and the dissent is logged. Escalation-class
  decisions (legal, financial, ownership, ethical) go to the Chairman.
